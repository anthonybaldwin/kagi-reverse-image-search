<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kagi Reverse Image Search</title>
  <style>
    :root {
      --bg-color: #fafafa;
      --text-color: #1a1a1a;
      --secondary-text: #666666;
      --border-color: #FFC700;
      --button-bg: #FFC700;
      --button-hover: #e6b400;
      --button-secondary-bg: #f0f0f0;
      --button-secondary-hover: #e0e0e0;
      --card-bg: #ffffff;
      --loading-bg: #fffbeb;
      --error-bg: #fef2f2;
      --error-border: #ef4444;
      --shadow-color: rgba(0, 0, 0, 0.08);
      --shadow-hover: rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      max-width: 700px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
      color: var(--text-color);
      background-color: var(--bg-color);
      line-height: 1.5;
      transition: background-color 0.2s, color 0.2s;
    }

    /* Logo */
    .logo {
      width: 160px;
      height: auto;
      margin-bottom: 32px;
    }

    .logo svg {
      width: 100%;
      height: auto;
      color: var(--text-color);
    }

    /* Image container */
    .image-container {
      margin: 24px 0;
      padding: 20px;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 2px 8px var(--shadow-color);
    }

    .image-container p {
      font-size: 14px;
      color: var(--secondary-text);
      margin-bottom: 16px;
      font-weight: 500;
    }

    .image-container img {
      max-width: 100%;
      max-height: 350px;
      border: 3px solid var(--border-color);
      border-radius: 8px;
      box-shadow: 0 4px 12px var(--shadow-color);
    }

    /* Loading state */
    .loading {
      margin: 24px 0;
      padding: 20px 24px;
      font-size: 14px;
      color: var(--secondary-text);
      background-color: var(--loading-bg);
      border-radius: 8px;
      border-left: 4px solid var(--border-color);
    }

    .loading.error {
      background-color: var(--error-bg);
      border-left-color: var(--error-border);
      color: #991b1b;
    }

    /* Buttons */
    .button {
      display: inline-block;
      padding: 14px 28px;
      background-color: var(--button-bg);
      color: #000000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      margin: 8px;
      text-decoration: none;
      transition: all 0.15s ease;
      box-shadow: 0 2px 4px var(--shadow-color);
    }

    .button:hover {
      background-color: var(--button-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 8px var(--shadow-hover);
    }

    .button:active {
      transform: translateY(0);
    }

    .button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .button-secondary {
      background-color: var(--button-secondary-bg);
      color: var(--text-color);
    }

    .button-secondary:hover {
      background-color: var(--button-secondary-hover);
    }

    .button-container {
      margin-top: 24px;
    }

    /* Upload indicator */
    .upload-indicator {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: 0 4px 16px var(--shadow-color);
      font-size: 14px;
      color: var(--secondary-text);
      z-index: 1000;
    }

    /* Error state */
    .error-state {
      padding: 24px;
      background: var(--error-bg);
      border-radius: 12px;
      text-align: center;
    }

    .error-state h2 {
      font-size: 18px;
      color: #991b1b;
      margin-bottom: 12px;
    }

    .error-state p {
      color: var(--secondary-text);
      margin-bottom: 8px;
    }

    .error-state .error-message {
      color: #991b1b;
      font-family: monospace;
      font-size: 13px;
      background: rgba(0,0,0,0.05);
      padding: 8px 12px;
      border-radius: 4px;
      margin: 12px 0;
    }

    .error-actions {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    /* Dark theme */
    body.dark-theme {
      --bg-color: #1a1a1a;
      --text-color: #f0f0f0;
      --secondary-text: #a0a0a0;
      --card-bg: #262626;
      --loading-bg: #2a2a1a;
      --error-bg: #2a1a1a;
      --button-secondary-bg: #333333;
      --button-secondary-hover: #444444;
      --shadow-color: rgba(0, 0, 0, 0.3);
      --shadow-hover: rgba(0, 0, 0, 0.4);
    }

    body.dark-theme .logo svg {
      color: #f0f0f0;
    }
  </style>
</head>

  </div>

  <div class="image-container" style="display: none;">
    <p>Selected image:</p>
    <img id="selectedImage" src="" alt="Selected image">
  </div>

  <div id="loading" class="loading">
    Loading image...
  </div>

  <div class="button-container">
    <button id="searchButton" class="button" style="display: none;">Search with Kagi</button>
  </div>

  <script src="search-theme.js"></script>
  <script src="search.js"></script>
</body>
</html>
